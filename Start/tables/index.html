<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tables-Forms</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <img height="340" src="images.png" alt="Dog Image" />
    <hr />

    <table>
      <caption>
        Friends Details
      </caption>
      <thead>
        <tr>
          <th>Name</th>
          <th>Gender</th>
          <th>Age</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Ashoka</td>
          <td>Male</td>
          <td>21</td>
        </tr>
        <tr>
          <td>Druva</td>
          <td>Male</td>
          <td>23</td>
        </tr>
        <tr>
          <td colspan="2">Manja</td>
          <td rowspan="2">26</td>
        </tr>
        <tr>
          <td colspan="2">Manja</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="2">Venom</td>
          <td rowspan="2">556</td>
        </tr>
      </tfoot>
    </table>
    <h1>Lists</h1>
    <ul type="circle">
      <li>Peace</li>
      <li>Nature</li>
      <li>Alone</li>
    </ul>

    <ol type="1">
      <li>Anger</li>
      <li>Money</li>
      <li>People</li>
    </ol>

    <h1>Forms</h1>
    <h1>Prep with Harsha</h1>

    <h3>Personal Information</h3>

    <form action="post">
      <div>
        <label for="username"> Name:</label>
        <input
          type="text"
          name="username"
          id="username"
          placeholder="eg.dhanush"
        />
      </div>
      <div>
        <label for="email">Email id:</label>
        <input type="email" id="email" placeholder="dhanud@479gmail.com" />
      </div>
      <div>
        <label for="pass">Password:</label>
        <input type="password" id="pass" placeholder="Enter your Password" />
      </div>

      <label for="gender">Gender</label>
      <input type="radio" name="gender" id="gender" />
      <label for="male">Male</label>
      <input type="radio" name="gender" id="gender" />

      <label for="female">Female</label>

      <input type="radio" id="gender" name="gender" />
      <label for="others">Others</label>

      <h3>Select Course</h3>
      <label for="check">DSA</label>
      <input type="checkbox" name="check" id="check" />
      <br />
      <label for="check">Java</label>
      <input type="checkbox" name="check" id="check" />
      <br />
      <label for="check">Python</label>
      <input type="checkbox" name="check" id="check" />
      <br />
      <label for="check">Spring</label>
      <input type="checkbox" name="check" id="check" />
      <br />
      <label for="city">City</label>
      <div>
      <select name="city" id="city">
        <option value="2">Mandya</option>
        <option value="">Tumkur</option>
      </select>
      </div>

      <br />

      <div>
        <label for="info">About Yourself:</label>
        <br />
        <textarea
          name="info"
          id="info"
          rows="4"
          cols="40"
          placeholder="Describe Few lines about You"
        ></textarea>
      </div>
      <label for="register">Resgister</label>
      <input type="submit"  id="register">
    </form>
  </body>
</html>
